<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - QuizGenius</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-primary: #030307; --bg-card: #0a0a14; --accent: #00d4aa; --accent-glow: rgba(0, 212, 170, 0.4); --text-primary: #ffffff; --text-secondary: #9ca3af; --border: #1e1e2e; --gradient-primary: linear-gradient(135deg, #00d4aa 0%, #00b894 100%); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .bg-gradient { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: -1; overflow: hidden; }
        .bg-gradient::before { content: ''; position: absolute; width: 600px; height: 600px; background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%); top: -200px; left: -200px; animation: float 20s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(50px, 50px); } }
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 24px; padding: 48px; width: 100%; max-width: 420px; }
        .logo { display: flex; align-items: center; gap: 12px; font-family: 'Space Grotesk', sans-serif; font-size: 24px; font-weight: 700; text-decoration: none; color: var(--text-primary); margin-bottom: 32px; justify-content: center; }
        .logo-icon { width: 40px; height: 40px; background: var(--gradient-primary); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 800; }
        h1 { font-size: 28px; margin-bottom: 8px; text-align: center; }
        p.subtitle { color: var(--text-secondary); text-align: center; margin-bottom: 32px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 14px; }
        input { width: 100%; padding: 14px 16px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 12px; color: var(--text-primary); font-size: 16px; font-family: inherit; transition: border-color 0.2s; }
        input:focus { outline: none; border-color: var(--accent); }
        .btn { width: 100%; padding: 14px; border-radius: 12px; font-weight: 600; font-size: 16px; cursor: pointer; border: none; transition: all 0.3s; }
        .btn-primary { background: var(--gradient-primary); color: #000; margin-top: 8px; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px var(--accent-glow); }
        .btn-secondary { background: rgba(255,255,255,0.05); color: var(--text-primary); border: 1px solid var(--border); margin-top: 12px; }
        .btn-secondary:hover { border-color: var(--accent); }
        .links { text-align: center; margin-top: 24px; color: var(--text-secondary); font-size: 14px; }
        .links a { color: var(--accent); text-decoration: none; }
        .links a:hover { text-decoration: underline; }
        .alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; }
        .alert-error { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: #ef4444; }
        .alert-success { background: rgba(0, 212, 170, 0.1); border: 1px solid rgba(0, 212, 170, 0.3); color: var(--accent); }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="card">
        <a href="/" class="logo"><div class="logo-icon">Q</div>QuizGenius</a>
        <h1>Welcome back</h1>
        <p class="subtitle">Sign in to your account</p>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}
        
        <form method="POST">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="Your password">
            </div>
            <button type="submit" class="btn btn-primary">Sign In</button>
        </form>
        
        <div class="links">
            Don't have an account? <a href="/register">Sign up</a>
        </div>
    </div>
</body>
</html>
